<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sakshi! ❤️</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #ff6b81;
            --secondary-color: #ff4757;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-dark: #2f3542;
            --text-light: #57606f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            overflow-x: hidden;
            cursor: none; /* Hide default cursor for custom one */
        }

        /* Custom Cursor */
        .cursor-glow {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,107,129,0.5) 0%, rgba(255,107,129,0) 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s;
            mix-blend-mode: multiply;
        }

        h1, h2, h3, .name-reveal {
            font-family: 'Cormorant Garamond', serif;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* Music Player */
        .music-player {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.3);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s;
        }

        .music-player:hover {
            transform: scale(1.1);
        }

        .music-player i {
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .playing i {
            animation: pulse 1.5s infinite;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            text-align: center;
            padding: 50px;
            z-index: 10;
            max-width: 800px;
            width: 90%;
        }

        .typing-text {
            font-size: 2rem;
            color: var(--text-light);
            min-height: 40px;
            margin-bottom: 20px;
        }

        .name-reveal {
            font-family: 'Dancing Script', cursive;
            font-size: 6rem;
            color: var(--secondary-color);
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            opacity: 0;
            transform: scale(0.8);
        }

        .scroll-down {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-color);
            font-weight: 600;
            animation: bounce 2s infinite;
        }

        .scroll-down i {
            margin-top: 10px;
            font-size: 1.5rem;
        }

        /* Particles */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        /* Common Section Styles */
        section {
            padding: 100px 20px;
            position: relative;
            z-index: 2;
        }

        .section-title {
            text-align: center;
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 50px;
        }

        /* Counter Section */
        .love-counter {
            text-align: center;
        }

        .counter-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            flex-wrap: wrap;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-block span {
            font-size: 3.5rem;
            font-weight: 600;
            color: var(--secondary-color);
            font-family: 'Cormorant Garamond', serif;
        }

        .time-block label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-light);
            margin-top: 10px;
        }

        .premium-btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.4);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .premium-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 107, 129, 0.6);
        }

        /* Gallery Section */
        .gallery-section {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        .gallery-item {
            padding: 20px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(50px);
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02) !important;
            z-index: 10;
        }

        .img-wrapper {
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: var(--secondary-color);
        }

        /* Letter Section */
        .letter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .envelope-container {
            position: relative;
            cursor: pointer;
            perspective: 1000px;
        }

        .envelope {
            width: 350px;
            height: 250px;
            background: #ffeaa7;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            transition: transform 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope:hover {
            transform: translateY(-10px);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 150px solid #f9ca24;
            transform-origin: top;
            transition: transform 0.6s;
            z-index: 3;
        }

        .envelope-body {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 4;
            pointer-events: none;
        }

        .seal {
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .click-instruction {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            color: #d35400;
        }

        .letter {
            position: absolute;
            bottom: 0;
            width: 90%;
            height: 90%;
            background: #fff;
            z-index: 2;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.8s, height 0.8s;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .letter-content {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            opacity: 0;
            white-space: pre-wrap;
        }

        /* Envelope Open State */
        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }
        
        .envelope-container.open .envelope-body {
            opacity: 0;
        }

        .envelope-container.open .letter {
            transform: translateY(-150px);
            height: 400px;
            z-index: 5;
            overflow-y: auto;
        }

        .envelope-container.open .letter-content {
            opacity: 1;
            transition: opacity 1s ease 0.5s;
        }

        /* Surprise Section */
        .surprise-section {
            text-align: center;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bday-countdown {
            font-size: 4rem;
            font-family: 'Cormorant Garamond', serif;
            color: var(--secondary-color);
            font-weight: 600;
            margin-top: 20px;
        }

        .giant-btn {
            font-size: 1.5rem;
            padding: 20px 50px;
            margin-top: 50px;
            animation: pulse 2s infinite;
        }

        /* Surprise Modal */
        .surprise-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .surprise-modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            text-align: center;
            position: relative;
        }

        .magical-text {
            font-family: 'Dancing Script', cursive;
            font-size: 5vw;
            color: #ff9ff3;
            text-shadow: 0 0 20px rgba(255, 159, 243, 0.8);
            margin-bottom: 40px;
        }

        .beating-heart {
            font-size: 15vw;
            color: #ff4d4d;
            animation: heartbeat 1s infinite alternate;
            filter: drop-shadow(0 0 30px rgba(255, 77, 77, 0.8));
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: -50px;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Animations */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-20px) translateX(-50%); }
            60% { transform: translateY(-10px) translateX(-50%); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        @media (max-width: 768px) {
            .name-reveal { font-size: 4rem; }
            .section-title { font-size: 2.5rem; }
            .time-block span { font-size: 2.5rem; }
            .magical-text { font-size: 10vw; }
            .beating-heart { font-size: 30vw; }
            .envelope { width: 300px; }
            .envelope-container.open .letter { transform: translateY(-100px); height: 350px; }
        }
    </style>
</head>
<body>

    <div class="cursor-glow" id="cursor"></div>

    <div class="music-player" id="musicPlayer">
        <i class="fas fa-play" id="playIcon"></i>
    </div>

    <!-- Music placeholder. Note: Browsers block auto-play, so it starts on interaction. -->
    <audio id="bgAudio" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-piano-wedding-890.mp3" type="audio/mpeg">
    </audio>

    <section class="hero" id="hero">
        <div class="hero-content glass-panel">
            <h1 class="typing-text" id="heroText1"></h1>
            <h2 class="name-reveal">Sakshi</h2>
            <p class="typing-text" id="heroText2"></p>
            <div class="scroll-down">
                <span>Scroll Down</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        <div id="particles"></div>
    </section>



    <section class="gallery-section">
        <h2 class="section-title">Our Beautiful Moments</h2>
        <div class="gallery">
            <div class="gallery-item glass-panel">
                <div class="img-wrapper">
                    <img src="1.jpeg" alt="Day 1">
                </div>
                <p>Day 1: Where it all began</p>
            </div>
            <div class="gallery-item glass-panel">
                <div class="img-wrapper">
                    <img src="2.jpeg" alt="Year 1">
                </div>
                <p>Year 1: A year of butterflies</p>
            </div>
            <div class="gallery-item glass-panel">
                <div class="img-wrapper">
                    <img src="3.jpeg" alt="Year 2">
                </div>
                <p>Year 2: Growing together</p>
            </div>
        </div>
    </section>

    <section class="letter-section">
        <h2 class="section-title">A Letter For You</h2>
        <div class="envelope-container" id="envelope">
            <div class="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body">
                    <i class="fas fa-heart seal"></i>
                    <p class="click-instruction">Click to Open</p>
                </div>
                <div class="letter" id="letter">
                    <div class="letter-content" id="letterContent"></div>
                </div>
            </div>
        </div>
    </section>

    <section class="surprise-section">
        <h2 class="section-title">Birthday Countdown</h2>
        <div class="countdown-container glass-panel" style="padding: 30px; text-align: center;">
            <div id="bdayCountdown" class="bday-countdown">00:00:00</div>
            <p style="margin-top: 10px; color: var(--text-light); font-weight: 600;">Until the special day!</p>
        </div>
        
        <button id="finalSurpriseBtn" class="premium-btn giant-btn">Click for a Magical Surprise ✨</button>
        
        <div id="surpriseModal" class="surprise-modal">
            <div class="modal-content">
                <button id="closeModalBtn" class="close-btn"><i class="fas fa-times"></i></button>
                <h1 class="magical-text">I Love You Forever, Sakshi ❤️</h1>
                <div class="beating-heart"><i class="fas fa-heart"></i></div>
            </div>
        </div>
    </section>

    <!-- GSAP & Canvas Confetti -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        // Register ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // --- Custom Cursor ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, {
                x: e.clientX,
                y: e.clientY,
                duration: 0.1,
                ease: "power2.out"
            });
        });

        // Hover effect for cursor on interactive elements
        const interactiveElements = document.querySelectorAll('button, .music-player, .envelope-container, a');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '60px';
                cursor.style.height = '60px';
                cursor.style.background = 'radial-gradient(circle, rgba(255,107,129,0.8) 0%, rgba(255,107,129,0) 70%)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '40px';
                cursor.style.height = '40px';
                cursor.style.background = 'radial-gradient(circle, rgba(255,107,129,0.5) 0%, rgba(255,107,129,0) 70%)';
            });
        });

        // --- Background Particles ---
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            let particle = document.createElement('div');
            particle.classList.add('particle');
            
            let size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            
            particlesContainer.appendChild(particle);

            gsap.to(particle, {
                y: `-=${Math.random() * 200 + 100}`,
                x: `+=${Math.random() * 100 - 50}`,
                opacity: 0,
                duration: Math.random() * 5 + 3,
                repeat: -1,
                ease: "power1.inOut",
                yoyo: true
            });
        }

        // --- Audio Player ---
        const audio = document.getElementById('bgAudio');
        const musicPlayer = document.getElementById('musicPlayer');
        const playIcon = document.getElementById('playIcon');
        let isPlaying = false;

        // Ensure audio plays when first clicked anywhere
        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                audio.play();
                isPlaying = true;
                playIcon.classList.replace('fa-play', 'fa-pause');
                musicPlayer.classList.add('playing');
            }
        }, { once: true });

        musicPlayer.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                musicPlayer.classList.remove('playing');
            } else {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
                musicPlayer.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });

        // --- Typing Animations ---
        const typeWriter = (elementId, text, speed, onComplete) => {
            let i = 0;
            const element = document.getElementById(elementId);
            element.innerHTML = "";
            const interval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    if (onComplete) onComplete();
                }
            }, speed);
        };

        // Hero Sequence
        setTimeout(() => {
            typeWriter('heroText1', "Happy Birthday My Love ❤️", 100, () => {
                gsap.to('.name-reveal', {
                    opacity: 1, 
                    scale: 1, 
                    duration: 1.5, 
                    ease: "elastic.out(1, 0.3)",
                    onComplete: () => {
                        typeWriter('heroText2', "You Make Every Day Beautiful.", 80);
                    }
                });
            });
        }, 500);



        // --- Gallery GSAP Scroll Reveal ---
        gsap.utils.toArray('.gallery-item').forEach((item, i) => {
            gsap.to(item, {
                scrollTrigger: {
                    trigger: item,
                    start: "top 85%",
                    toggleActions: "play none none reverse"
                },
                opacity: 1,
                y: 0,
                duration: 0.8,
                delay: i * 0.2,
                ease: "power3.out"
            });
        });

        // --- Envelope Letter ---
        const envelope = document.getElementById('envelope');
        const letterContent = document.getElementById('letterContent');
        let letterOpened = false;

        const letterText = `My Dearest Sakshi,

Since the day we met, my life has been filled with a light and joy I never knew existed. You are my greatest adventure and my safest home. 

Every moment we share becomes my new favorite memory. I admire your kindness, your strength, and that beautiful smile that makes my heart skip a beat.

Happy Birthday, my love. I can't wait to celebrate you today, tomorrow, and for all the years to come.

Yours always,
Mahi ❤️`;

        envelope.addEventListener('click', () => {
            if (!letterOpened) {
                envelope.classList.add('open');
                letterOpened = true;
                
                // Wait for envelope open animation to finish before typing
                setTimeout(() => {
                    typeWriter('letterContent', letterText, 40);
                }, 1500);
            }
        });

        // --- Birthday Countdown ---
        // Set exactly 1 minute from now
        let nextBirthday = new Date();
        nextBirthday.setMinutes(nextBirthday.getMinutes() + 1);

        const updateBdayCountdown = () => {
            const now = new Date().getTime();
            const difference = nextBirthday.getTime() - now;

            if (difference < 0) {
                document.getElementById('bdayCountdown').innerText = "IT'S TODAY! 🎉";
                return;
            }

            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('bdayCountdown').innerText = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        };

        setInterval(updateBdayCountdown, 1000);
        updateBdayCountdown();

        // --- Final Surprise Modal ---
        const surpriseBtn = document.getElementById('finalSurpriseBtn');
        const modal = document.getElementById('surpriseModal');
        const closeModalBtn = document.getElementById('closeModalBtn');

        surpriseBtn.addEventListener('click', () => {
            modal.classList.add('active');
            
            // Continuous fireworks
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
                }));
                confetti(Object.assign({}, defaults, { particleCount,
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
                }));
            }, 250);
        });

        closeModalBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

    </script>
</body>
</html>
